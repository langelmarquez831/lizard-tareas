<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas · Lizard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#00324b;--green:#62bb46;--bg:#f0f4f7;--surface:#fff;--border:#e8eef2;--muted:#7a96a4;--text:#0e2233}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--dark);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{height:32px}
.hdr-title{color:#fff;font-size:14px;font-weight:600}
.hdr-sub{color:rgba(255,255,255,0.5);font-size:11px}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge-on{background:rgba(98,187,70,0.15);border:1px solid rgba(98,187,70,0.3);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%}
.ava{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.btn-cfg{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:7px;color:rgba(255,255,255,0.8);font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.body{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:800px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi{background:var(--surface);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700}
.kpi-val.g{color:#2d7d1e}.kpi-val.a{color:#b45309}.kpi-val.r{color:#991b1b}
.card{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border)}
.card-ttl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;justify-content:space-between}
.tl-wrap{position:relative;height:44px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:6px}
.tl-now{position:absolute;top:0;width:2px;height:100%;background:var(--dark);opacity:.4;z-index:5}
.tl-blk{position:absolute;top:3px;height:calc(100% - 6px);border-radius:6px;opacity:.88;cursor:pointer;transition:opacity .2s}
.tl-blk:hover{opacity:1}
.tl-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:0 2px;margin-bottom:8px}
.tl-leg{display:flex;flex-wrap:wrap;gap:8px}
.tl-li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.tl-dot{width:8px;height:8px;border-radius:2px}
.tl-empty{text-align:center;color:var(--muted);font-size:12px;padding:12px 0}
.tooltip{position:fixed;background:var(--dark);border-radius:8px;padding:6px 10px;font-size:11px;color:#fff;pointer-events:none;z-index:999;display:none;white-space:nowrap}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{font-size:11px;border-radius:20px;padding:4px 12px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.fbtn.active{background:#e6f1fb;color:#185FA5;border-color:#B5D4F4;font-weight:600}
.tasks{display:flex;flex-direction:column;gap:8px}
.task{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;background:var(--surface)}
.task.ejec{border-color:#fac775;background:#fffbf3}
.task.corr{border-color:#fca5a5;background:#fff8f8}
.task.audit{border-color:#c4b5fd;background:#faf8ff}
.t-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.t-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;border:1px solid}
.b-bl{background:#e6f1fb;color:#0C447C;border-color:#B5D4F4}
.b-ej{background:#fef3c7;color:#92400e;border-color:#fde68a}
.b-cr{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5}
.b-au{background:#ede9fe;color:#3730a3;border-color:#c4b5fd}
.b-dn{background:#d1fae5;color:#064e3b;border-color:#6ee7b7}
.t-proj{font-size:10px;color:var(--muted);font-weight:500}
.t-name{font-size:13px;font-weight:600;margin:0}
.t-sub{font-size:11px;color:var(--muted);margin-top:2px}
.obs{margin-top:10px;background:#fee2e2;border-radius:7px;padding:8px 10px;font-size:11px;color:#7f1d1d;border:1px solid #fca5a5;display:flex;gap:6px;line-height:1.5}
.btn-row{display:flex;gap:6px;flex-shrink:0}
.btn{border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.b-play{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.b-end{background:var(--dark);color:#fff}
.b-corr{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5}
.tmenu{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tmenu-lbl{font-size:11px;color:var(--muted);font-weight:500}
.b-rev{background:#ede9fe;color:#3730a3;border:1px solid #c4b5fd;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.b-done{background:#d1fae5;color:#064e3b;border:1px solid #6ee7b7;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.tbadge{background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
.loader{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px;color:#7f1d1d;font-size:12px;text-align:center;margin-top:8px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.cfg-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:14px}
.cfg-card h2{font-size:14px;font-weight:700;margin-bottom:6px}
.cfg-card p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.base-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.base-row input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;outline:none}
.base-row input:focus{border-color:var(--dark)}
.b-add{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;width:100%;margin-bottom:8px}
.b-save{background:var(--dark);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;width:100%}
.b-del{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5;border-radius:7px;padding:6px 8px;cursor:pointer;font-size:11px}
.name-card{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);max-width:380px;margin:0 auto;text-align:center;margin-bottom:14px}
.name-card h2{font-size:15px;font-weight:700;margin-bottom:6px}
.name-card p{font-size:12px;color:var(--muted);margin-bottom:14px}
.name-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;margin-bottom:10px}
.name-card input:focus{border-color:var(--dark)}
@media(max-width:500px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
const PAT = "patE6lPmJrwnIs5LH.60362b395112fa9ec2a279766b659cae6619cd6235f49ebb31535a4ece671054";
const BASES_DEFAULT = [{id:"appXHs7cljRLc06wA", nombre:"Tareas Administrativas"}];
const TBL_T = "Tareas";
const COLORS = ["#378ADD","#1D9E75","#D85A30","#7F77DD","#D4537E","#BA7517","#0F6E56","#EA580C"];
const S_CLASS = {Backlog:"",Ejecución:"ejec","Por Corregir":"corr",Auditoria:"audit",Done:""};
const B_CLASS = {Backlog:"b-bl",Ejecución:"b-ej","Por Corregir":"b-cr",Auditoria:"b-au",Done:"b-dn"};

let allT=[], timers={}, filter="Todas", assignee="";
let sesLocal = JSON.parse(localStorage.getItem("liz_ses")||"[]");

function getBases(){const s=JSON.parse(localStorage.getItem("liz_bases")||"[]");return s.length?s:BASES_DEFAULT;}
function getAssignee(){return new URL(location.href).searchParams.get("nombre")||localStorage.getItem("liz_name")||"";}
function fmt(m){if(!m||m<0)return"0m";const h=Math.floor(m/60),mm=Math.round(m%60);return h>0?h+"h "+mm+"m":mm+"m";}
function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"):String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0");}

async function apiGet(bid,table,params={}){
  const url=new URL("https://api.airtable.com/v0/"+bid+"/"+encodeURIComponent(table));
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  let recs=[],offset;
  do{
    if(offset)url.searchParams.set("offset",offset);else url.searchParams.delete("offset");
    const res=await fetch(url,{headers:{Authorization:"Bearer "+PAT}});
    if(!res.ok){const e=await res.json();throw new Error((e.error&&e.error.message)||"Error "+res.status);}
    const d=await res.json();recs=recs.concat(d.records||[]);offset=d.offset;
  }while(offset);
  return recs;
}

async function apiPatch(bid,table,id,fields){
  const res=await fetch("https://api.airtable.com/v0/"+bid+"/"+encodeURIComponent(table)+"/"+id,{
    method:"PATCH",
    headers:{Authorization:"Bearer "+PAT,"Content-Type":"application/json"},
    body:JSON.stringify({fields})
  });
  if(!res.ok){const e=await res.json();throw new Error((e.error&&e.error.message)||"Error "+res.status);}
  return res.json();
}

function updKPIs(){
  document.getElementById("k-done").textContent=allT.filter(t=>t.f.Status==="Done").length;
  document.getElementById("k-ejec").textContent=allT.filter(t=>t.f.Status==="Ejecución").length;
  document.getElementById("k-audit").textContent=allT.filter(t=>t.f.Status==="Auditoria").length;
  document.getElementById("k-corr").textContent=allT.filter(t=>t.f.Status==="Por Corregir").length;
}

function renderTL(){
  const S=6,E=20,TOT=(E-S)*60;
  const bar=document.getElementById("tl-bar");
  const leg=document.getElementById("tl-leg");
  const lbl=document.getElementById("tl-lbl");
  document.getElementById("tl-fecha").textContent=new Date().toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long"});
  bar.querySelectorAll(".tl-blk").forEach(b=>b.remove());
  leg.innerHTML="";
  const horas=["6am","8am","10am","12pm","2pm","4pm","6pm","8pm"];
  lbl.innerHTML=horas.map(h=>"<span>"+h+"</span>").join("");
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes()-S*60;
  document.getElementById("tl-now").style.left=Math.max(0,Math.min(100,nowMins/TOT*100))+"%";
  const hoy=now.toISOString().slice(0,10);
  const sesHoy=sesLocal.filter(s=>s.fecha===hoy);
  if(!sesHoy.length){
    if(!bar.querySelector(".tl-empty"))bar.insertAdjacentHTML("beforeend","<div class='tl-empty' style='position:absolute;width:100%;top:50%;transform:translateY(-50%)'>Sin sesiones registradas hoy</div>");
    return;
  }
  bar.querySelectorAll(".tl-empty").forEach(e=>e.remove());
  const colors={};let ci=0;
  sesHoy.forEach(s=>{
    if(!colors[s.nombre])colors[s.nombre]=COLORS[ci++%COLORS.length];
    const iM=s.inicioMins-S*60,fM=s.finMins-S*60;
    const left=Math.max(0,iM/TOT*100),w=Math.max(0.8,(fM-iM)/TOT*100);
    const el=document.createElement("div");el.className="tl-blk";
    el.style.cssText="left:"+left+"%;width:"+w+"%;background:"+colors[s.nombre]+";";
    el.addEventListener("mouseenter",e=>{
      const t=document.getElementById("tooltip");
      t.textContent=s.nombre+" · "+fmt(fM-iM);
      t.style.display="block";t.style.left=(e.clientX+10)+"px";t.style.top=(e.clientY-30)+"px";
    });
    el.addEventListener("mouseleave",()=>{document.getElementById("tooltip").style.display="none";});
    bar.appendChild(el);
  });
  Object.entries(colors).forEach(([n,c])=>{
    const el=document.createElement("div");el.className="tl-li";
    el.innerHTML="<div class='tl-dot' style='background:"+c+"'></div>"+n;
    leg.appendChild(el);
  });
}

function renderFilters(){
  const ACTIVE=["Backlog","Ejecución","Por Corregir","Auditoria"];
  const cnt={};allT.filter(t=>ACTIVE.includes(t.f.Status)).forEach(t=>{cnt[t.f.Status]=(cnt[t.f.Status]||0)+1;});
  const total=Object.values(cnt).reduce((a,b)=>a+b,0);
  const row=document.getElementById("frow");row.innerHTML="";
  ["Todas",...Object.keys(cnt)].forEach(f=>{
    const btn=document.createElement("button");btn.className="fbtn"+(f===filter?" active":"");
    btn.textContent=f==="Todas"?"Todas ("+total+")":f+" ("+(cnt[f]||0)+")";
    btn.onclick=()=>{filter=f;renderFilters();renderTasks();};row.appendChild(btn);
  });
}

function renderTasks(){
  const ACTIVE=["Backlog","Ejecución","Por Corregir","Auditoria"];
  let tasks=allT.filter(t=>ACTIVE.includes(t.f.Status));
  if(filter!=="Todas")tasks=tasks.filter(t=>t.f.Status===filter);
  document.getElementById("t-count").textContent=tasks.length+" tarea"+(tasks.length!==1?"s":"");
  const list=document.getElementById("tlist");list.innerHTML="";
  if(!tasks.length){list.innerHTML="<div class='empty'>No hay tareas en este estado</div>";return;}
  tasks.forEach(t=>{
    const st=t.f.Status||"Backlog";
    const card=document.createElement("div");card.className="task "+(S_CLASS[st]||"");card.id="tk-"+t.id;
    let btns="";
    if(st==="Backlog") btns='<button class="btn b-play" data-id="'+t.id+'" data-bid="'+t.bid+'" onclick="iniciarBtn(this)">▶ Iniciar</button>';
    else if(st==="Ejecución") btns='<button class="btn b-end" data-id="'+t.id+'" onclick="showMenu(this.dataset.id)">✓ Terminar</button>';
    else if(st==="Por Corregir") btns='<button class="btn b-corr" data-id="'+t.id+'" data-bid="'+t.bid+'" onclick="corregirBtn(this)">✎ Corregir</button>';
    const obs=t.f.Observaciones?"<div class='obs'><span>⚠</span><span>"+t.f.Observaciones+"</span></div>":"";
    const timer=(st==="Ejecución"&&timers[t.id])?"<span class='tbadge' id='tmr-"+t.id+"'>00:00</span>":"";
    card.innerHTML='<div class="t-top"><div style="flex:1;min-width:0"><div class="t-meta"><span class="bdg '+(B_CLASS[st]||'b-bl')+'">'+st+'</span><span class="t-proj">'+t.bname+'</span>'+timer+'</div><p class="t-name">'+(t.f.Tarea||'Sin nombre')+'</p></div><div class="btn-row">'+btns+'</div></div>'+obs+'<div class="tmenu" id="tm-'+t.id+'" style="display:none"><span class="tmenu-lbl">¿Cómo termina?</span><button class="b-rev" data-id="'+t.id+'" data-bid="'+t.bid+'" onclick="auditoriaBtn(this)">👁 Enviar a revisión</button><button class="b-done" data-id="'+t.id+'" data-bid="'+t.bid+'" onclick="doneBtn(this)">✓ Marcar como done</button></div>';
    list.appendChild(card);
    if(timers[t.id])startTimer(t.id,timers[t.id]);
  });
}

function showMenu(id){const m=document.getElementById("tm-"+id);if(m)m.style.display=m.style.display==="none"?"flex":"none";}

async function iniciar(id,bid,nombre){
  const card=document.getElementById("tk-"+id);if(card)card.style.opacity="0.5";
  try{
    await apiPatch(bid,TBL_T,id,{Status:"Ejecución"});
    timers[id]=Date.now();
    const now=new Date();
    const ses={id:id,nombre:nombre||"Tarea",fecha:now.toISOString().slice(0,10),inicioMins:now.getHours()*60+now.getMinutes(),finMins:now.getHours()*60+now.getMinutes(),inicio:now.toISOString()};
    sesLocal=sesLocal.filter(s=>s.id!==id);sesLocal.push(ses);
    localStorage.setItem("liz_ses",JSON.stringify(sesLocal));
    await loadData();
  }catch(e){showErr(e.message);if(card)card.style.opacity="1";}
}

async function cambiar(id,bid,nuevoStatus){
  const card=document.getElementById("tk-"+id);if(card)card.style.opacity="0.5";
  try{
    await apiPatch(bid,TBL_T,id,{Status:nuevoStatus});
    if(timers[id]){
      clearInterval(timers[id+"_iv"]);
      const ses=sesLocal.find(s=>s.id===id);
      if(ses){ses.finMins=new Date().getHours()*60+new Date().getMinutes();localStorage.setItem("liz_ses",JSON.stringify(sesLocal));}
      delete timers[id];delete timers[id+"_iv"];
    }
    await loadData();
  }catch(e){showErr(e.message);if(card)card.style.opacity="1";}
}

function startTimer(id,ms){
  const el=document.getElementById("tmr-"+id);if(!el)return;
  const tick=()=>{const s=Math.floor((Date.now()-ms)/1000);if(el)el.textContent=fmtT(s);};
  tick();timers[id+"_iv"]=setInterval(tick,1000);
}

function showErr(msg){
  const existing=document.getElementById("err-msg");if(existing)existing.remove();
  const el=document.createElement("div");el.className="err";el.id="err-msg";el.textContent="Error: "+msg;
  document.getElementById("mbody").prepend(el);
  setTimeout(()=>el.remove(),5000);
}

async function loadData(){
  try{
    const bases=getBases();
    const results=await Promise.all(bases.map(async b=>{
      const ts=await apiGet(b.id,TBL_T,{});
      ts.forEach(t=>{t.f=t.fields;t.bid=b.id;t.bname=b.nombre;});
      return ts;
    }));
    allT=results.flat();
    updKPIs();renderTL();renderFilters();renderTasks();
  }catch(e){showErr(e.message);}
}

function toggleConfig(){
  const existing=document.getElementById("cfg-panel");
  if(existing){existing.remove();return;}
  const panel=document.createElement("div");panel.className="cfg-card";panel.id="cfg-panel";
  panel.innerHTML='<h2>Bases de Airtable</h2><p>Base ID empieza con app... en airtable.com/api</p><div id="blist"></div><button class="b-add" onclick="addRow()">+ Agregar base</button><button class="b-save" onclick="saveConfig()">Guardar</button>';
  document.getElementById("mbody").prepend(panel);
  getBases().forEach(b=>addRow(b.id,b.nombre));
}
function addRow(id="",n=""){
  const l=document.getElementById("blist");if(!l)return;
  const r=document.createElement("div");r.className="base-row";
  r.innerHTML="<input type='text' placeholder='appXXXXXXXXXXXXXX' value='"+id+"'><input type='text' placeholder='Nombre proyecto' value='"+n+"'><button class='b-del' onclick='this.parentNode.remove()'>✕</button>";
  l.appendChild(r);
}
function saveConfig(){
  const rows=document.querySelectorAll("#blist .base-row");
  const bases=[];
  rows.forEach(r=>{const ins=r.querySelectorAll("input");const id=ins[0].value.trim(),n=ins[1].value.trim();if(id&&n)bases.push({id,nombre:n});});
  if(!bases.length){alert("Agrega al menos una base");return;}
  localStorage.setItem("liz_bases",JSON.stringify(bases));
  document.getElementById("cfg-panel")?.remove();
  loadData();
}

function showNameCard(){
  const c=document.createElement("div");c.className="name-card";c.id="name-card";
  c.innerHTML="<h2>¿Quién eres?</h2><p>Escribe tu nombre exactamente como aparece en Airtable</p><input id='n-inp' type='text' placeholder='Ej: Estephanie Lezama'><button class='b-save' onclick='setName()'>Entrar →</button>";
  document.getElementById("mbody").prepend(c);
  document.getElementById("n-inp").addEventListener("keydown",e=>{if(e.key==="Enter")setName();});
}
function setName(){
  const v=document.getElementById("n-inp")?.value?.trim();if(!v)return;
  localStorage.setItem("liz_name",v);assignee=v;
  document.getElementById("name-card")?.remove();
  document.getElementById("aname").textContent=v;
  document.getElementById("aini").textContent=v.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
  loadData();
}


function iniciarBtn(el){iniciar(el.dataset.id, el.dataset.bid, el.closest('.task').querySelector('.t-name').textContent);}
function corregirBtn(el){cambiar(el.dataset.id, el.dataset.bid, 'Ejecución');}
function auditoriaBtn(el){cambiar(el.dataset.id, el.dataset.bid, 'Auditoria');}
function doneBtn(el){cambiar(el.dataset.id, el.dataset.bid, 'Done');}

function init(){
  document.getElementById("fecha-hoy").textContent=new Date().toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long"});
  if(new URL(location.href).searchParams.get("config")==="1"){toggleConfig();return;}
  assignee=getAssignee();
  if(assignee){
    document.getElementById("aname").textContent=assignee;
    document.getElementById("aini").textContent=assignee.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
    loadData();
  }else{
    showNameCard();
    document.getElementById("aname").textContent="Identifícate";
  }
  setInterval(loadData,60000);
}
init();
</script>
</body>
</html>
